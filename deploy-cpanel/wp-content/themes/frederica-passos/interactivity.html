
<style>
/* Hero Carousel Styles */
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

.animate-scroll {
    animation: scroll 120s linear infinite;
}

/* Hover effects for area cards */
.area-card {
    transition: all 0.3s ease;
}

.area-card:hover {
    transform: scale(1.05);
}

.area-card:hover .area-overlay {
    opacity: 1;
}

.area-card:hover .area-glow {
    opacity: 1;
    height: 8px;
}

.area-description {
    opacity: 0;
    transition: opacity 0.3s ease;
}

.area-card:hover .area-description {
    opacity: 1;
}

/* Button hover effects */
.resource-btn:hover .resource-gradient {
    opacity: 1;
}

.resource-btn:hover .resource-text {
    opacity: 0;
}

.resource-btn:hover .resource-text-hover {
    opacity: 1;
}

/* Mobile menu styles */
@media (max-width: 768px) {
    #mobile-menu {
        display: none;
    }
    #mobile-menu.show {
        display: block;
    }
}

/* FAQ accordion */
.faq-item {
    transition: all 0.3s ease;
}

.faq-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
}

.faq-content.open {
    max-height: 500px;
}

/* Radio button styles */
.radio-option {
    transition: all 0.2s ease;
}

.radio-option:hover .radio-border {
    border-color: rgba(255, 255, 255, 0.6);
}

.radio-option input:checked + .radio-border {
    background-color: #70309e;
    border-color: #70309e;
}

/* Form styles */
.form-input {
    transition: all 0.3s ease;
}

.form-input:focus {
    border-color: rgba(255, 255, 255, 0.4) !important;
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
}
</style>


<script>
document.addEventListener("DOMContentLoaded", function() {
    console.log("🚀 Site Frederica Passos - Interatividade Carregada!");

    // Hero Carousel
    let currentSlide = 0;
    const slides = document.querySelectorAll(".slide-roxo, .slide-cinza, .slide-laranja");
    const dots = document.querySelectorAll(".slide-dot");
    const prevBtn = document.querySelector(".prev-slide");
    const nextBtn = document.querySelector(".next-slide");

    function showSlide(index) {
        // Esconder todos os slides
        slides.forEach(slide => slide.style.display = "none");
        dots.forEach(dot => dot.style.backgroundColor = "rgba(255, 255, 255, 0.5)");

        // Mostrar slide ativo
        slides[index].style.display = "block";
        dots[index].style.backgroundColor = "rgba(255, 255, 255, 1)";
        currentSlide = index;
    }

    // Event listeners
    if (prevBtn) {
        prevBtn.addEventListener("click", () => {
            const newIndex = currentSlide === 0 ? slides.length - 1 : currentSlide - 1;
            showSlide(newIndex);
        });
    }

    if (nextBtn) {
        nextBtn.addEventListener("click", () => {
            const newIndex = currentSlide === slides.length - 1 ? 0 : currentSlide + 1;
            showSlide(newIndex);
        });
    }

    dots.forEach((dot, index) => {
        dot.addEventListener("click", () => showSlide(index));
    });

    // Auto-play do carrossel
    setInterval(() => {
        const newIndex = currentSlide === slides.length - 1 ? 0 : currentSlide + 1;
        showSlide(newIndex);
    }, 5000);

    // FAQ Accordion
    document.querySelectorAll(".faq-toggle").forEach(button => {
        button.addEventListener("click", function() {
            const content = this.nextElementSibling;
            const isOpen = content.classList.contains("open");

            // Fechar todos os outros
            document.querySelectorAll(".faq-content").forEach(item => {
                item.classList.remove("open");
            });

            // Abrir/fechar o clicado
            if (!isOpen) {
                content.classList.add("open");
            }
        });
    });

    // Menu mobile
    const mobileMenuBtn = document.getElementById("mobile-menu-btn");
    const mobileMenu = document.getElementById("mobile-menu");

    if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener("click", function() {
            mobileMenu.classList.toggle("show");
        });
    }

    // Scroll to section
    document.querySelectorAll(".nav-item, .mobile-nav-item").forEach(item => {
        item.addEventListener("click", function(e) {
            e.preventDefault();
            const sectionId = this.getAttribute("data-section");
            const element = document.getElementById(sectionId);

            if (element) {
                const offset = 80;
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - offset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }

            // Fechar menu mobile
            if (mobileMenu) {
                mobileMenu.classList.remove("show");
            }
        });
    });

    // Header scroll effect
    let lastScrollY = window.scrollY;
    let isHeaderVisible = true;

    window.addEventListener("scroll", function() {
        const currentScrollY = window.scrollY;
        const header = document.getElementById("header");

        if (currentScrollY < 100) {
            header.style.transform = "translateY(0)";
            isHeaderVisible = true;
        } else if (currentScrollY > lastScrollY && currentScrollY > 100) {
            if (isHeaderVisible) {
                header.style.transform = "translateY(-100%)";
                isHeaderVisible = false;
            }
        } else if (currentScrollY < lastScrollY) {
            if (!isHeaderVisible) {
                header.style.transform = "translateY(0)";
                isHeaderVisible = true;
            }
        }

        lastScrollY = currentScrollY;
    });

    // Scroll to top button
    const scrollTopBtn = document.getElementById("scroll-to-top");

    if (scrollTopBtn) {
        window.addEventListener("scroll", function() {
            if (window.scrollY > 300) {
                scrollTopBtn.style.opacity = "1";
                scrollTopBtn.style.visibility = "visible";
                scrollTopBtn.style.transform = "translateY(0)";
            } else {
                scrollTopBtn.style.opacity = "0";
                scrollTopBtn.style.visibility = "hidden";
                scrollTopBtn.style.transform = "translateY(1rem)";
            }
        });

        scrollTopBtn.addEventListener("click", function() {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    }

    // CTA Button hover effects
    document.querySelectorAll(".cta-button").forEach(button => {
        const gradient = button.querySelector(".gradient-overlay");

        if (gradient) {
            button.addEventListener("mouseenter", function() {
                gradient.style.opacity = "1";
                button.style.transform = "scale(1.05)";
            });

            button.addEventListener("mouseleave", function() {
                gradient.style.opacity = "0";
                button.style.transform = "scale(1)";
            });
        }
    });

    console.log("✅ Todas as funcionalidades carregadas com sucesso!");
});
</script>
